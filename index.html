<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信息采集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 24px;
            padding-top: 10px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.85;
        }

        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 28px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        label .required {
            color: #e74c3c;
            margin-left: 2px;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
            font-family: inherit;
        }

        input:focus,
        textarea:focus {
            border-color: #667eea;
        }

        textarea {
            height: 80px;
            resize: vertical;
        }

        .photo-upload-area {
            border: 2px dashed #d0d0d0;
            border-radius: 12px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            background: #fafbfc;
        }

        .photo-upload-area:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .photo-upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 42px;
            margin-bottom: 8px;
        }

        .upload-text {
            color: #999;
            font-size: 14px;
        }

        .upload-hint {
            color: #bbb;
            font-size: 12px;
            margin-top: 4px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 14px;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-item .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .success-page {
            display: none;
            background: #fff;
            border-radius: 16px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .success-page .icon {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .success-page h2 {
            color: #27ae60;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .success-page p {
            color: #999;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .success-page .again-btn {
            padding: 10px 30px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #e74c3c;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📋 信息采集表</h1>
        <p>请如实填写以下信息</p>
    </div>

    <div class="form-card" id="formCard">
        <form id="collectForm">
            <div class="form-group">
                <label>姓名<span class="required">*</span></label>
                <input type="text" id="name" placeholder="请输入您的姓名" required>
            </div>

            <div class="form-group">
                <label>手机号<span class="required">*</span></label>
                <input type="tel" id="phone" placeholder="请输入手机号码" maxlength="11" required>
            </div>

            <div class="form-group">
                <label>身份证号</label>
                <input type="text" id="idcard" placeholder="请输入身份证号码" maxlength="18">
            </div>

            <div class="form-group">
                <label>备注</label>
                <textarea id="remark" placeholder="如有其他信息请在此说明"></textarea>
            </div>

            <div class="form-group">
                <label>拍照/上传照片<span class="required">*</span></label>
                <div class="photo-upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击拍照或选择图片上传</div>
                    <div class="upload-hint">支持 jpg、png 格式，最多5张</div>
                    <input type="file" id="photoInput" accept="image/*" capture="environment" multiple>
                </div>
                <div class="preview-grid" id="previewGrid"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">提 交</button>
        </form>
    </div>

    <div class="success-page" id="successPage">
        <div class="icon">🎉</div>
        <h2>提交成功！</h2>
        <p>感谢您的填写，信息已收到</p>
        <button class="again-btn" onclick="resetForm()">继续填写</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
    let selectedFiles = [];
    const MAX_PHOTOS = 5;

    function showToast(msg, isError) {
        var toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = isError ? 'toast error show' : 'toast show';
        setTimeout(function() { toast.className = 'toast'; }, 3000);
    }

    function compressImage(file, maxWidth, quality) {
        maxWidth = maxWidth || 1200;
        quality = quality || 0.75;
        return new Promise(function(resolve) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var w = img.width;
                    var h = img.height;
                    if (w > maxWidth) {
                        h = (maxWidth / w) * h;
                        w = maxWidth;
                    }
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(function(blob) { resolve(blob); }, 'image/jpeg', quality);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('photoInput').addEventListener('change', function(e) {
        var files = Array.from(e.target.files);
        if (selectedFiles.length + files.length > MAX_PHOTOS) {
            showToast('最多只能上传' + MAX_PHOTOS + '张照片', true);
            return;
        }
        for (var i = 0; i < files.length; i++) {
            if (!files[i].type.startsWith('image/')) continue;
            selectedFiles.push({
                file: files[i],
                preview: URL.createObjectURL(files[i])
            });
        }
        renderPreviews();
        e.target.value = '';
    });

    function renderPreviews() {
        var grid = document.getElementById('previewGrid');
        grid.innerHTML = '';
        for (var i = 0; i < selectedFiles.length; i++) {
            var div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = '<img src="' + selectedFiles[i].preview + '">' +
                '<button type="button" class="remove-btn" onclick="removePhoto(' + i + ')">✕</button>';
            grid.appendChild(div);
        }
    }

    function removePhoto(index) {
        URL.revokeObjectURL(selectedFiles[index].preview);
        selectedFiles.splice(index, 1);
        renderPreviews();
    }

    function uploadPhoto(file) {
        return compressImage(file).then(function(compressed) {
            var fileName = Date.now() + '_' + Math.random().toString(36).substr(2, 8) + '.jpg';

            return fetch(
                SUPABASE_URL + '/storage/v1/object/' + BUCKET_NAME + '/' + fileName,
                {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'image/jpeg',
                        'x-upsert': 'true'
                    },
                    body: compressed
                }
            ).then(function(response) {
                if (!response.ok) {
                    return response.text().then(function(err) {
                        throw new Error('图片上传失败: ' + err);
                    });
                }
                return SUPABASE_URL + '/storage/v1/object/public/' + BUCKET_NAME + '/' + fileName;
            });
        });
    }

    function saveRecord(data) {
        return fetch(
            SUPABASE_URL + '/rest/v1/submissions',
            {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + SUPABASE_KEY,
                    'apikey': SUPABASE_KEY,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(data)
            }
        ).then(function(response) {
            if (!response.ok) {
                return response.text().then(function(err) {
                    throw new Error('数据保存失败: ' + err);
                });
            }
        });
    }

    document.getElementById('collectForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var name = document.getElementById('name').value.trim();
        var phone = document.getElementById('phone').value.trim();
        var idcard = document.getElementById('idcard').value.trim();
        var remark = document.getElementById('remark').value.trim();

        if (!name) { showToast('请输入姓名', true); return; }
        if (!phone || !/^1\d{10}$/.test(phone)) { showToast('请输入正确的手机号', true); return; }
        if (selectedFiles.length === 0) { showToast('请至少上传一张照片', true); return; }

        var btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>提交中...';

        var photoUrls = [];
        var uploadIndex = 0;

        function uploadNext() {
            if (uploadIndex >= selectedFiles.length) {
                btn.innerHTML = '<span class="spinner"></span>保存信息...';
                return saveRecord({
                    name: name,
                    phone: phone,
                    idcard: idcard,
                    remark: remark,
                    photos: photoUrls
                }).then(function() {
                    document.getElementById('formCard').style.display = 'none';
                    document.getElementById('successPage').style.display = 'block';
                });
            }

            btn.innerHTML = '<span class="spinner"></span>上传照片 ' + (uploadIndex + 1) + '/' + selectedFiles.length;
            return uploadPhoto(selectedFiles[uploadIndex].file).then(function(url) {
                photoUrls.push(url);
                uploadIndex++;
                return uploadNext();
            });
        }

        uploadNext().catch(function(error) {
            console.error(error);
            showToast('提交失败: ' + error.message, true);
            btn.disabled = false;
            btn.textContent = '提 交';
        });
    });

    function resetForm() {
        document.getElementById('collectForm').reset();
        selectedFiles = [];
        renderPreviews();
        document.getElementById('formCard').style.display = 'block';
        document.getElementById('successPage').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').textContent = '提 交';
    }
</script>

</body>
</html>
